name: Plugin CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin
          submodules: recursive
          token: ${{ secrets.MYSTREAM_PLUGIN_SDK_REPO_TOKEN }}

      - name: Build and validate package
        run: |
          python3 plugin/tools/package_plugin.py \
            --repo-root "$GITHUB_WORKSPACE/plugin" \
            --sdk-dir "$GITHUB_WORKSPACE/plugin/sdk" \
            --build-dir "$RUNNER_TEMP/mystream-plugin-build" \
            --output-dir "$RUNNER_TEMP/mystream-plugin-dist" \
            --clean

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: mystream-plugin-package
          path: ${{ runner.temp }}/mystream-plugin-dist/*.zip
