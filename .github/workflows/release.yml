name: Release Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin
          submodules: recursive
          token: ${{ secrets.MYSTREAM_PLUGIN_SDK_REPO_TOKEN }}

      - name: Build package
        run: |
          python3 plugin/tools/package_plugin.py \
            --repo-root "$GITHUB_WORKSPACE/plugin" \
            --sdk-dir "$GITHUB_WORKSPACE/plugin/sdk" \
            --build-dir "$RUNNER_TEMP/mystream-plugin-build" \
            --output-dir "$RUNNER_TEMP/mystream-plugin-dist" \
            --clean

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/mystream-plugin-dist/*.zip
          generate_release_notes: true
