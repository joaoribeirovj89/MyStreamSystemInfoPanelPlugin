name: Release Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  MYSTREAM_PLUGIN_SDK_REPOSITORY: joaoribeirovj89/MyStreamPluginSDK

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Read SDK version
        id: sdk
        run: |
          SDK_VERSION="$(cat plugin/.sdk-version)"
          echo "version=$SDK_VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate SDK repository token
        env:
          SDK_TOKEN: ${{ secrets.MYSTREAM_PLUGIN_SDK_REPO_TOKEN }}
        run: |
          if [ -z "$SDK_TOKEN" ]; then
            echo "::error title=Missing SDK token::Create repository secret MYSTREAM_PLUGIN_SDK_REPO_TOKEN with read-only Contents access to $MYSTREAM_PLUGIN_SDK_REPOSITORY."
            exit 1
          fi

      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MYSTREAM_PLUGIN_SDK_REPOSITORY }}
          ref: v${{ steps.sdk.outputs.version }}
          path: MyStreamPluginSDK
          token: ${{ secrets.MYSTREAM_PLUGIN_SDK_REPO_TOKEN }}

      - name: Build package
        run: |
          python3 plugin/tools/package_plugin.py \
            --repo-root "$GITHUB_WORKSPACE/plugin" \
            --sdk-dir "$GITHUB_WORKSPACE/MyStreamPluginSDK" \
            --build-dir "$RUNNER_TEMP/mystream-plugin-build" \
            --output-dir "$RUNNER_TEMP/mystream-plugin-dist" \
            --clean

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/mystream-plugin-dist/*.zip
          generate_release_notes: true
